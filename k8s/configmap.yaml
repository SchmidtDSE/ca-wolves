apiVersion: v1
kind: ConfigMap
metadata:
  name: ca-wolves-config
data:
  config.template.json: |
    {
        "mcp_server_url": "${MCP_SERVER_URL}",
        "llm_model": "minimax-m2",
        "llm_models": [
            {
                "value": "gemma",
                "label": "NRP Gemma",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "nemotron",
                "label": "DSE Nemotron",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "glm-4.7",
                "label": "NRP GLM-4.7",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "qwen3",
                "label": "NRP Qwen3",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "gpt-oss",
                "label": "NRP GPT-OSS 120B",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "kimi",
                "label": "NRP Kimi K2.5",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "minimax-m2",
                "label": "NRP MiniMax M2.5",
                "endpoint": "/api/llm",
                "api_key": "unused"
            }
        ]
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ca-wolves-nginx
data:
  nginx.conf.template: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept";

        location /api/llm/ {
            proxy_pass https://open-llm-proxy.nrp-nautilus.io/v1/;
            proxy_set_header Authorization "Bearer ${PROXY_KEY}";
            proxy_set_header Host open-llm-proxy.nrp-nautilus.io;
            proxy_ssl_server_name on;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
