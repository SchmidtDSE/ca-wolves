<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Wolf Tracker</title>

    <!--
        Geo-Chat core modules loaded from CDN.
        Pin to a tag (@v1.0.0) for production stability,
        or use @main for staging/development.
    -->
    <script type="importmap">
    {
        "imports": {
            "@modelcontextprotocol/sdk/client/index.js": "https://esm.sh/@modelcontextprotocol/sdk@1.12.0/client/index",
            "@modelcontextprotocol/sdk/client/streamableHttp.js": "https://esm.sh/@modelcontextprotocol/sdk@1.12.0/client/streamableHttp"
        }
    }
    </script>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.css" rel="stylesheet" />

    <!-- Capture map instance before geo-agent module runs -->
    <script>
    window.__geoMap = null;
    const _OrigMap = maplibregl.Map;
    maplibregl.Map = new Proxy(_OrigMap, {
      construct(target, args) {
        const inst = Reflect.construct(target, args);
        window.__geoMap = inst;
        return inst;
      }
    });
    </script>

    <!-- Wolf animation controls -->
    <style>
    #wolf-anim-controls {
      position: absolute;
      bottom: 14px;
      left: 50px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
    }
    #wolf-play-btn {
      background: none;
      border: 1px solid #999;
      border-radius: 3px;
      cursor: pointer;
      padding: 2px 6px;
      font-size: 12px;
      line-height: 1;
    }
    #wolf-play-btn:hover { background: #eee; }
    #wolf-time-display {
      color: #333;
      min-width: 160px;
    }
    #wolf-speed {
      font-size: 11px;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px 2px;
    }
    </style>

    <!-- PMTiles protocol -->
    <script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>

    <!-- h3-js (for hex grid overlay) -->
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>

    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>

    <!-- Core styles from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@35d6df70ad1febd540abc3c9076c8525250d58a5/app/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@35d6df70ad1febd540abc3c9076c8525250d58a5/app/chat.css">
</head>

<body>
    <!-- Map -->
    <div id="map"></div>

    <!-- Layer controls — generated by MapManager.generateMenu() -->
    <div id="menu"></div>

    <!-- Chat interface -->
    <div id="chat-container">
        <div id="chat-header">
            <h3>Wolf Data Assistant</h3>
            <button id="chat-toggle" title="Toggle chat">−</button>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Ask about wolf territories or pack activity…" autocomplete="off">
            <button id="chat-send">Send</button>
        </div>
        <div id="chat-footer">
            <select id="model-selector" title="Select model"></select>
        </div>
    </div>

    <!-- Boot from CDN -->
    <script type="module" src="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@35d6df70ad1febd540abc3c9076c8525250d58a5/app/main.js"></script>

    <!-- Wolf trajectory animation -->
    <script type="module" src="wolf-animation.js"></script>
</body>

</html>
